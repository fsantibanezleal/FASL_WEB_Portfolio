# --- BEGIN fasl-work.com rewrite ---
# Must be ABOVE WordPress rules. Serves fasl-work.com from subdirectory.
RewriteEngine On

# Bare IP access → redirect to fasl-work.com
RewriteCond %{HTTP_HOST} ^92\.204\.212\.218$ [NC]
RewriteRule ^(.*)$ https://fasl-work.com/$1 [R=301,L]

# fasl-work.com → serve from public_html/fasl-work.com/
RewriteCond %{HTTP_HOST} ^(www\.)?fasl-work\.com$ [NC]
RewriteCond %{REQUEST_URI} !^/fasl-work\.com/
RewriteRule ^(.*)$ /fasl-work.com/$1 [L]
# --- END fasl-work.com rewrite ---
