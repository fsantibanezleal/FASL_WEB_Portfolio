# ─────────────────────────────────────────────────────────
#  Rewrite rules for fasl-work.com
#
#  This file goes in $HOME/public_html/.htaccess
#  It transparently serves content from the fasl-work.com/
#  subdirectory without showing it in the URL.
#
#  IMPORTANT: If you already have rules in .htaccess,
#  merge these lines — don't replace the whole file.
# ─────────────────────────────────────────────────────────

# --- BEGIN fasl-work.com rewrite ---
RewriteEngine On

# Only apply to requests coming via fasl-work.com
RewriteCond %{HTTP_HOST} ^(www\.)?fasl-work\.com$ [NC]

# Skip if already rewriting into the subdirectory (prevent loop)
RewriteCond %{REQUEST_URI} !^/fasl-work\.com/

# Transparently serve from the subdirectory
RewriteRule ^(.*)$ /fasl-work.com/$1 [L]
# --- END fasl-work.com rewrite ---
