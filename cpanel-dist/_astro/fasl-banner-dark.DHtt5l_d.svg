<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" width="960" height="320">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif; }
      .tagline { font-family: 'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif; }
      .monogram { font-family: 'Segoe UI Light', 'Helvetica Neue Thin', 'Inter', sans-serif; }
    </style>
    <linearGradient id="bg-grad-d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#101820"/>
    </linearGradient>
    <linearGradient id="acc-d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="50%" stop-color="#29B6F6"/>
      <stop offset="100%" stop-color="#0288D1"/>
    </linearGradient>
    <linearGradient id="hex-fill-d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4FC3F7" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0288D1" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="letter-grad-d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAED" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#8B949E" stop-opacity="0.30"/>
    </linearGradient>
    <!-- Fade edges -->
    <linearGradient id="trace-fade-left-d" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#29B6F6" stop-opacity="0"/>
      <stop offset="100%" stop-color="#29B6F6" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="trace-fade-right-d" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#29B6F6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#29B6F6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="320" fill="url(#bg-grad-d)"/>

  <!-- === CIRCUIT TRACE NETWORK (spanning full width) === -->
  <!-- Horizontal traces -->
  <line x1="0" y1="80" x2="120" y2="80" stroke="#1a2332" stroke-width="1"/>
  <line x1="0" y1="160" x2="90" y2="160" stroke="#1a2332" stroke-width="1"/>
  <line x1="0" y1="240" x2="110" y2="240" stroke="#1a2332" stroke-width="1"/>

  <line x1="340" y1="100" x2="960" y2="100" stroke="#1a2332" stroke-width="1"/>
  <line x1="360" y1="220" x2="960" y2="220" stroke="#1a2332" stroke-width="1"/>

  <!-- Accent trace lines (subtle glow) -->
  <line x1="0" y1="100" x2="100" y2="100" stroke="url(#trace-fade-left-d)" stroke-width="0.8"/>
  <line x1="860" y1="100" x2="960" y2="100" stroke="url(#trace-fade-right-d)" stroke-width="0.8"/>
  <line x1="860" y1="220" x2="960" y2="220" stroke="url(#trace-fade-right-d)" stroke-width="0.8"/>

  <!-- Circuit nodes scattered -->
  <circle cx="50" cy="80" r="2" fill="#1e3a5f"/>
  <circle cx="120" cy="80" r="2.5" fill="#1e3a5f"/>
  <circle cx="70" cy="160" r="2" fill="#1e3a5f"/>
  <circle cx="90" cy="240" r="2" fill="#1e3a5f"/>
  <circle cx="400" cy="100" r="2" fill="#1e3a5f"/>
  <circle cx="600" cy="100" r="1.5" fill="#1e3a5f"/>
  <circle cx="800" cy="100" r="2" fill="#1e3a5f"/>
  <circle cx="500" cy="220" r="2" fill="#1e3a5f"/>
  <circle cx="750" cy="220" r="1.5" fill="#1e3a5f"/>
  <circle cx="900" cy="220" r="2" fill="#1e3a5f"/>

  <!-- === LEFT: HEXAGON ICON === -->
  <g transform="translate(170, 160)">
    <!-- Outer hexagon -->
    <polygon points="0,-68 59,-34 59,34 0,68 -59,34 -59,-34"
             fill="none" stroke="url(#acc-d)" stroke-width="1.8" stroke-linejoin="round"/>

    <!-- Inner hexagon -->
    <polygon points="0,-52 45,-26 45,26 0,52 -45,26 -45,-26"
             fill="url(#hex-fill-d)" stroke="#29B6F6" stroke-width="0.5" stroke-linejoin="round" opacity="0.5"/>

    <!-- Circuit traces from vertices -->
    <line x1="0" y1="-68" x2="0" y2="-86" stroke="#29B6F6" stroke-width="1" opacity="0.45"/>
    <circle cx="0" cy="-88" r="2.2" fill="#29B6F6" opacity="0.55"/>

    <line x1="59" y1="-34" x2="76" y2="-44" stroke="#29B6F6" stroke-width="1" opacity="0.45"/>
    <circle cx="78" cy="-45" r="2.2" fill="#29B6F6" opacity="0.55"/>

    <line x1="59" y1="34" x2="76" y2="44" stroke="#29B6F6" stroke-width="1" opacity="0.45"/>
    <circle cx="78" cy="45" r="2.2" fill="#29B6F6" opacity="0.55"/>

    <line x1="0" y1="68" x2="0" y2="86" stroke="#29B6F6" stroke-width="1" opacity="0.45"/>
    <circle cx="0" cy="88" r="2.2" fill="#29B6F6" opacity="0.55"/>

    <line x1="-59" y1="34" x2="-76" y2="44" stroke="#29B6F6" stroke-width="1" opacity="0.45"/>
    <circle cx="-78" cy="45" r="2.2" fill="#29B6F6" opacity="0.55"/>

    <line x1="-59" y1="-34" x2="-76" y2="-44" stroke="#29B6F6" stroke-width="1" opacity="0.45"/>
    <circle cx="-78" cy="-45" r="2.2" fill="#29B6F6" opacity="0.55"/>

    <!-- Abstract F — upper-left -->
    <text x="-16" y="-8" class="monogram" fill="url(#letter-grad-d)" font-size="26" font-weight="300" text-anchor="middle" opacity="0.65">F</text>

    <!-- Dot separator -->
    <circle cx="0" cy="4" r="2" fill="#29B6F6" opacity="0.55"/>

    <!-- Abstract W — lower-right -->
    <text x="16" y="28" class="monogram" fill="url(#letter-grad-d)" font-size="26" font-weight="300" text-anchor="middle" opacity="0.65">W</text>

    <!-- Diagonal connector -->
    <line x1="-8" y1="-2" x2="8" y2="18" stroke="#29B6F6" stroke-width="0.4" opacity="0.2"/>
  </g>

  <!-- === CONNECTING TRACE: hex to text === -->
  <line x1="250" y1="160" x2="350" y2="160" stroke="#29B6F6" stroke-width="0.6" opacity="0.2"/>
  <circle cx="300" cy="160" r="1.5" fill="#29B6F6" opacity="0.3"/>

  <!-- === RIGHT: TYPOGRAPHY === -->

  <!-- Brand name -->
  <text x="580" y="148" class="title" fill="#E8EAED" font-size="52" font-weight="600" letter-spacing="6" text-anchor="middle">FASL<tspan fill="#29B6F6">.</tspan>WORK</text>

  <!-- Accent line under title -->
  <line x1="420" y1="170" x2="740" y2="170" stroke="#29B6F6" stroke-width="0.7" opacity="0.35"/>

  <!-- Tagline -->
  <text x="580" y="200" class="tagline" fill="#8B949E" font-size="13" font-weight="400" letter-spacing="4.5" text-anchor="middle">ENGINEERING &amp; APPLIED TECHNOLOGY</text>

  <!-- Secondary descriptor -->
  <text x="580" y="226" class="tagline" fill="#484F58" font-size="10" font-weight="400" letter-spacing="3" text-anchor="middle">RESEARCH  ·  HARDWARE  ·  DIGITAL SOLUTIONS</text>
</svg>
