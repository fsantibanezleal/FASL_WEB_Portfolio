<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" width="480" height="360">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif; }
      .tagline { font-family: 'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif; }
      .monogram { font-family: 'Segoe UI Light', 'Helvetica Neue Thin', 'Inter', sans-serif; }
    </style>
    <linearGradient id="accent-l3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0277BD"/>
      <stop offset="50%" stop-color="#01579B"/>
      <stop offset="100%" stop-color="#004A7C"/>
    </linearGradient>
    <linearGradient id="fill-l3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0277BD" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#01579B" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="letter-l3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2332" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#57606A" stop-opacity="0.30"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="360" fill="#FAFBFC"/>

  <!-- Background circuit traces -->
  <line x1="0" y1="88" x2="158" y2="88" stroke="#E8ECF0" stroke-width="1"/>
  <line x1="322" y1="88" x2="480" y2="88" stroke="#E8ECF0" stroke-width="1"/>
  <line x1="0" y1="148" x2="138" y2="148" stroke="#E8ECF0" stroke-width="1"/>
  <line x1="342" y1="148" x2="480" y2="148" stroke="#E8ECF0" stroke-width="1"/>

  <!-- Circuit nodes -->
  <circle cx="60" cy="88" r="2" fill="#C8D1DA"/>
  <circle cx="420" cy="88" r="2" fill="#C8D1DA"/>
  <circle cx="40" cy="148" r="2" fill="#C8D1DA"/>
  <circle cx="440" cy="148" r="2" fill="#C8D1DA"/>

  <!-- === HEXAGON ICON === -->

  <!-- Outer hexagon -->
  <polygon points="240,38 290,67 290,125 240,154 190,125 190,67"
           fill="none" stroke="url(#accent-l3)" stroke-width="1.8" stroke-linejoin="round"/>

  <!-- Inner hexagon -->
  <polygon points="240,52 278,74 278,118 240,140 202,118 202,74"
           fill="url(#fill-l3)" stroke="#0277BD" stroke-width="0.5" stroke-linejoin="round" opacity="0.5"/>

  <!-- Circuit traces from vertices -->
  <line x1="240" y1="38" x2="240" y2="18" stroke="#0277BD" stroke-width="1" opacity="0.35"/>
  <circle cx="240" cy="16" r="2.2" fill="#0277BD" opacity="0.45"/>

  <line x1="290" y1="67" x2="308" y2="56" stroke="#0277BD" stroke-width="1" opacity="0.35"/>
  <circle cx="310" cy="55" r="2.2" fill="#0277BD" opacity="0.45"/>

  <line x1="290" y1="125" x2="308" y2="136" stroke="#0277BD" stroke-width="1" opacity="0.35"/>
  <circle cx="310" cy="137" r="2.2" fill="#0277BD" opacity="0.45"/>

  <line x1="240" y1="154" x2="240" y2="170" stroke="#0277BD" stroke-width="1" opacity="0.35"/>
  <circle cx="240" cy="172" r="2.2" fill="#0277BD" opacity="0.45"/>

  <line x1="190" y1="67" x2="172" y2="56" stroke="#0277BD" stroke-width="1" opacity="0.35"/>
  <circle cx="170" cy="55" r="2.2" fill="#0277BD" opacity="0.45"/>

  <line x1="190" y1="125" x2="172" y2="136" stroke="#0277BD" stroke-width="1" opacity="0.35"/>
  <circle cx="170" cy="137" r="2.2" fill="#0277BD" opacity="0.45"/>

  <!-- === ABSTRACT MONOGRAM: F upper-left, dot, W lower-right === -->

  <!-- F -->
  <text x="222" y="86" class="monogram" fill="url(#letter-l3)" font-size="22" font-weight="300" text-anchor="middle" opacity="0.65">F</text>

  <!-- Separator dot -->
  <circle cx="240" cy="96" r="1.8" fill="#0277BD" opacity="0.5"/>

  <!-- W -->
  <text x="258" y="118" class="monogram" fill="url(#letter-l3)" font-size="22" font-weight="300" text-anchor="middle" opacity="0.65">W</text>

  <!-- Subtle diagonal connector -->
  <line x1="228" y1="89" x2="252" y2="107" stroke="#0277BD" stroke-width="0.4" opacity="0.2"/>

  <!-- === TYPOGRAPHY === -->

  <!-- Brand name -->
  <text x="240" y="216" class="title" fill="#1A2332" font-size="30" font-weight="600" letter-spacing="5" text-anchor="middle">FASL<tspan fill="#0277BD">.</tspan>WORK</text>

  <!-- Thin accent line -->
  <line x1="152" y1="232" x2="328" y2="232" stroke="#0277BD" stroke-width="0.6" opacity="0.25"/>

  <!-- Tagline -->
  <text x="240" y="256" class="tagline" fill="#57606A" font-size="9.5" font-weight="400" letter-spacing="3.5" text-anchor="middle">ENGINEERING &amp; APPLIED TECHNOLOGY</text>

  <!-- Secondary descriptor -->
  <text x="240" y="274" class="tagline" fill="#8B949E" font-size="7.8" font-weight="400" letter-spacing="2.8" text-anchor="middle">RESEARCH  ·  HARDWARE  ·  DIGITAL SOLUTIONS</text>
</svg>
